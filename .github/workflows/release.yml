name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Step 1: create the draft release with auto-generated changelog ────────
  create-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.id }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so changelog can diff against previous tag

      - name: Create draft release with auto changelog
        id: create
        uses: softprops/action-gh-release@v2
        with:
          name: vagaread ${{ github.ref_name }}
          draft: true
          prerelease: false
          generate_release_notes: true   # groups commits by PR labels / lists commits
          body_suffix: |
            ## Downloads
            | Platform | File |
            |---|---|
            | Linux | `.AppImage` (portable, any distro) or `.deb` (Debian/Ubuntu) |
            | macOS | `.dmg` (universal — Intel + Apple Silicon) |
            | Windows | `.msi` or `.exe` (NSIS installer) |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Step 2: build on each platform and upload artifacts ──────────────────
  build:
    needs: create-release
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux — produces .deb + .AppImage
          - platform: ubuntu-22.04
            rust-targets: ''
            args: ''

          # macOS — universal binary (Intel + Apple Silicon in one dmg)
          - platform: macos-latest
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            args: '--target universal-apple-darwin'

          # Windows — produces .msi + nsis .exe
          - platform: windows-latest
            rust-targets: ''
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: bun install

      - name: Build and upload artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}
